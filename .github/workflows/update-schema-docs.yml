name: Update Changelog and Deprecations

on:
  push:
    branches:
      - main
    paths:
      - 'docs/Rubrik-Security-Cloud-API/schemas/**.graphql'

jobs:
  update-schema-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4.2.2
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5.6.0
      with:
        python-version: '3.x'

    - name: Set up Node.js
      uses: actions/setup-node@v4.4.0
      with:
        node-version: '24'

    - name: Install Python dependencies
      run: pip install -r requirements.txt

    - name: Install graphql-inspector
      run: npm install -g @graphql-inspector/cli

    - name: Regenerate Changelog
      run: python3 tools/generate_comprehensive_changelog.py

    - name: Regenerate Deprecations
      run: python3 tools/extract_deprecated_fields.py

    - name: Commit updated docs
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add docs/Rubrik-Security-Cloud-API/API-Reference/Changelog.md \
                docs/Rubrik-Security-Cloud-API/API-Reference/Deprecations.md
        git diff --staged --quiet || git commit -m "Auto-update Changelog and Deprecations for new schema"
        git push
