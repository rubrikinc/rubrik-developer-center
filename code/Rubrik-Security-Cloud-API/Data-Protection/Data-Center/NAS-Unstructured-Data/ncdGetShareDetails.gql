query {
  cloudDirectNasShare(fid: "11111111-2222-3333-4444-555555555555") {
    id
    name
    protocol
    ncdPolicyName
    cloudDirectId
    isRelic
    isStale
    totalSnapshots
    newestSnapshot {
      id
      date
    }
    oldestSnapshot {
      id
      date
    }
    effectiveSlaDomain {
      id
      name
    }
    cloudDirectNasSystem {
      id
      name
      vendorType
    }
    cloudDirectNasNamespace {
      id
      name
    }
  }
}
