mutation {
  bulkUpdateOracleDatabases(input: {
    bulkUpdateProperties: {
      ids: ["40bac7c1-87ad-4ac0-b4a6-34ac592d8e77"]
      oracleUpdate: {
        oracleUpdateCommon: {
          logBackupFrequencyInMinutes: 30
          logRetentionHours: 720       # 30 days. -1 = delete immediately, 0 = inherit from parent
          isPaused: false
        }
      }
    }
  }) {
    responses {
      dbUniqueName
      snapshotCount
    }
  }
}
